name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm -r test

  package:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r build

      - name: Package VSIX
        run: cd packages/extension && pnpm package

      - name: Verify VSIX contains bundled LSP server
        run: |
          VSIX=$(ls packages/extension/*.vsix | head -n 1)
          echo "Inspecting $VSIX"
          unzip -l "$VSIX" | tee /tmp/vsix-listing.txt
          grep -q 'extension/dist/server.js' /tmp/vsix-listing.txt || {
            echo "::error::VSIX is missing bundled LSP server (extension/dist/server.js)"
            exit 1
          }
          grep -q 'extension/dist/extension.js' /tmp/vsix-listing.txt || {
            echo "::error::VSIX is missing bundled extension entry (extension/dist/extension.js)"
            exit 1
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: solidity-workbench-vsix
          path: packages/extension/*.vsix
